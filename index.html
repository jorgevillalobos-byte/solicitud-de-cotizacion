<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte de Auditoría</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f6f9;
      margin: 0;
      padding: 0;
      color: #001f3f;
    }

    .container {
      max-width: 1140px;
      margin: auto;
      background: white;
      padding: 20px;
      min-height: 100vh;
    }

    h1, h2, h3 {
      color: #001f3f;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 9px;
      margin-top: 5px;
      border: 1px solid #ccd6e0;
      border-radius: 5px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 70px;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-save {
      background: #00a65a;
      color: white;
    }

    .btn-pdf {
      background: #2f5f98;
      color: white;
    }

    .btn-clear {
      background: #435a78;
      color: white;
    }

    .btn-delete {
      background: #d9534f;
      color: white;
    }

    .btn-add {
      background: #001f3f;
      color: white;
    }

    .audit-card {
      background: #fff;
      border: 1px solid #dce3ea;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .summary-box {
      background: #eef4f8;
      border: 1px solid #d5e1ea;
      border-radius: 7px;
      padding: 10px;
    }

    .summary-box small {
      display: block;
      color: #2f5f98;
      font-weight: bold;
    }

    .summary-box strong {
      font-size: 20px;
    }

    .project-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 15px;
    }

    .project-table th,
    .project-table td {
      border: 1px solid #dce3ea;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    .project-table th {
      background: #f4f7fa;
    }

    .row-risk {
      background: #fff9dc;
    }

    .row-attention {
      background: #fdece8;
    }

    .project-link {
      color: #0645ad;
      font-weight: bold;
      text-decoration: underline;
    }

    .status-risk {
      background: #fff2cc;
      color: #a66a00;
      padding: 6px 10px;
      border-radius: 5px;
      font-weight: bold;
      display: inline-block;
    }

    .status-attention {
      background: #ffd9d2;
      color: red;
      padding: 6px 10px;
      border-radius: 5px;
      font-weight: bold;
      display: inline-block;
    }

    .status-good {
      background: #dff0d8;
      color: #2d7a2d;
      padding: 6px 10px;
      border-radius: 5px;
      font-weight: bold;
      display: inline-block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      align-items: end;
      margin-bottom: 20px;
    }

    .search-box div {
      flex: 1;
    }

    @media print {
      button,
      .form-section,
      .search-box {
        display: none !important;
      }

      body {
        background: white;
      }

      .container {
        padding: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Reporte de Auditoría</h1>

    <div class="form-section">
      <h2>Crear Auditoría</h2>

      <div class="form-grid">
        <div>
          <label>Fecha de Auditoría</label>
          <input type="date" id="fechaAuditoria" />
        </div>

        <div>
          <label>Auditor</label>
          <input type="text" id="auditor" value="Jorge VILLALOBOS" />
        </div>

        <div>
          <label>Team Responsable</label>
          <input type="text" id="team" placeholder="Customer Services" />
        </div>
      </div>

      <h3>Agregar Proyecto</h3>

      <div class="form-grid">
        <div>
          <label>Project URL</label>
          <input type="url" id="projectUrl" placeholder="https://..." />
        </div>

        <div>
          <label>Categoría</label>
          <input type="text" id="categoria" placeholder="Recuperación GBP" />
        </div>

        <div>
          <label>Días Late</label>
          <input type="number" id="diasLate" placeholder="50" />
        </div>
      </div>

      <div class="form-grid">
        <div>
          <label>Health</label>
          <select id="health">
            <option value="Good">Good</option>
            <option value="At Risk">At Risk</option>
            <option value="Needs Attention">Needs Attention</option>
          </select>
        </div>

        <div>
          <label>Bloqueo</label>
          <input type="text" id="bloqueo" placeholder="Opcional" />
        </div>

        <div>
          <label>Acción Requerida</label>
          <input type="text" id="accion" placeholder="Opcional" />
        </div>
      </div>

      <label>Última nota</label>
      <textarea id="ultimaNota" placeholder="Escribe la última nota del proyecto..."></textarea>

      <button class="btn-add" onclick="agregarProyecto()">Agregar Proyecto</button>

      <h3>Proyectos agregados</h3>
      <div id="previewProyectos"></div>

      <button class="btn-save" onclick="guardarAuditoria()">Guardar Auditoría</button>
    </div>

    <hr />

    <h2>Historial de Auditorías</h2>

    <div class="search-box">
      <div>
        <label>Buscar auditoría por fecha</label>
        <input type="date" id="buscarFecha" onchange="renderizarHistorial()" />
      </div>

      <button class="btn-clear" onclick="limpiarBusqueda()">Limpiar búsqueda</button>
      <button class="btn-pdf" onclick="guardarPDF()">Guardar Auditoría en PDF</button>
      <button class="btn-delete" onclick="borrarTodo()">Borrar historial</button>
    </div>

    <div id="historialAuditorias"></div>
  </div>

  <script>
    let proyectosTemporales = [];

    document.getElementById("fechaAuditoria").valueAsDate = new Date();

    function agregarProyecto() {
      const url = document.getElementById("projectUrl").value.trim();
      const team = document.getElementById("team").value.trim();
      const categoria = document.getElementById("categoria").value.trim();
      const diasLate = document.getElementById("diasLate").value;
      const health = document.getElementById("health").value;
      const ultimaNota = document.getElementById("ultimaNota").value.trim();
      const bloqueo = document.getElementById("bloqueo").value.trim();
      const accion = document.getElementById("accion").value.trim();

      if (!url || !team || !categoria || !diasLate || !ultimaNota) {
        alert("Completa Project URL, Team, Categoría, Días Late y Última nota.");
        return;
      }

      proyectosTemporales.push({
        url,
        team,
        categoria,
        diasLate: Number(diasLate),
        health,
        ultimaNota,
        bloqueo,
        accion
      });

      limpiarFormularioProyecto();
      renderizarPreview();
    }

    function limpiarFormularioProyecto() {
      document.getElementById("projectUrl").value = "";
      document.getElementById("categoria").value = "";
      document.getElementById("diasLate").value = "";
      document.getElementById("health").value = "Good";
      document.getElementById("ultimaNota").value = "";
      document.getElementById("bloqueo").value = "";
      document.getElementById("accion").value = "";
    }

    function renderizarPreview() {
      const contenedor = document.getElementById("previewProyectos");

      if (proyectosTemporales.length === 0) {
        contenedor.innerHTML = "<p>No hay proyectos agregados.</p>";
        return;
      }

      contenedor.innerHTML = `
        <table class="project-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Project URL</th>
              <th>Team Responsable</th>
              <th>Categoría</th>
              <th>Días Late</th>
              <th>Health</th>
              <th>Última nota</th>
            </tr>
          </thead>
          <tbody>
            ${proyectosTemporales.map((p, index) => `
              <tr>
                <td>${index + 1}</td>
                <td><a class="project-link" href="${p.url}" target="_blank">Open project</a></td>
                <td>${p.team}</td>
                <td>${p.categoria}</td>
                <td style="color:red;">${p.diasLate} días late</td>
                <td>${badgeHealth(p.health)}</td>
                <td>${p.ultimaNota}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function guardarAuditoria() {
      const fecha = document.getElementById("fechaAuditoria").value;
      const auditor = document.getElementById("auditor").value.trim();

      if (!fecha || !auditor) {
        alert("Completa la fecha y el auditor.");
        return;
      }

      if (proyectosTemporales.length === 0) {
        alert("Agrega al menos un proyecto.");
        return;
      }

      const auditorias = JSON.parse(localStorage.getItem("auditorias")) || [];

      const auditoria = {
        id: Date.now(),
        fecha,
        auditor,
        total: proyectosTemporales.length,
        good: proyectosTemporales.filter(p => p.health === "Good").length,
        atRisk: proyectosTemporales.filter(p => p.health === "At Risk").length,
        needsAttention: proyectosTemporales.filter(p => p.health === "Needs Attention").length,
        late: proyectosTemporales.filter(p => p.diasLate > 0).length,
        guardado: new Date().toLocaleString(),
        bloqueos: proyectosTemporales
          .filter(p => p.bloqueo)
          .map(p => p.bloqueo),
        acciones: proyectosTemporales
          .filter(p => p.accion)
          .map(p => p.accion),
        proyectos: proyectosTemporales
      };

      auditorias.unshift(auditoria);

      localStorage.setItem("auditorias", JSON.stringify(auditorias));

      proyectosTemporales = [];
      renderizarPreview();
      renderizarHistorial();

      alert("Auditoría guardada correctamente.");
    }

    function renderizarHistorial() {
      const contenedor = document.getElementById("historialAuditorias");
      const auditorias = JSON.parse(localStorage.getItem("auditorias")) || [];
      const buscarFecha = document.getElementById("buscarFecha").value;

      const filtradas = buscarFecha
        ? auditorias.filter(a => a.fecha === buscarFecha)
        : auditorias;

      if (filtradas.length === 0) {
        contenedor.innerHTML = "<p>No hay auditorías guardadas.</p>";
        return;
      }

      contenedor.innerHTML = filtradas.map((auditoria, index) => `
        <div class="audit-card">
          <h3>
            Auditoría ${index + 1} | Fecha: ${auditoria.fecha} |
            Auditor: ${auditoria.auditor} |
            Total: ${auditoria.total} |
            Guardado: ${auditoria.guardado}
          </h3>

          <div class="summary-grid">
            <div class="summary-box">
              <small>Total Projects</small>
              <strong>${auditoria.total}</strong>
            </div>
            <div class="summary-box">
              <small>Good</small>
              <strong>${auditoria.good}</strong>
            </div>
            <div class="summary-box">
              <small>At Risk</small>
              <strong>${auditoria.atRisk}</strong>
            </div>
            <div class="summary-box">
              <small>Needs Attention</small>
              <strong>${auditoria.needsAttention}</strong>
            </div>
            <div class="summary-box">
              <small>Late</small>
              <strong>${auditoria.late}</strong>
            </div>
          </div>

          <h3>Bloqueos Identificados</h3>
          ${
            auditoria.bloqueos && auditoria.bloqueos.length > 0
              ? `<ul>${auditoria.bloqueos.map(b => `<li>${b}</li>`).join("")}</ul>`
              : `<p>Sin bloqueos registrados.</p>`
          }

          <h3>Acciones Requeridas</h3>
          ${
            auditoria.acciones && auditoria.acciones.length > 0
              ? `<ul>${auditoria.acciones.map(a => `<li>${a}</li>`).join("")}</ul>`
              : `<p>Sin acciones registradas.</p>`
          }

          <h3>Proyectos auditados</h3>

          <table class="project-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Project URL</th>
                <th>Team Responsable</th>
                <th>Categoría</th>
                <th>Días Late</th>
                <th>Health</th>
                <th>Última nota</th>
              </tr>
            </thead>
            <tbody>
              ${auditoria.proyectos.map((p, i) => `
                <tr class="${p.health === "At Risk" ? "row-risk" : p.health === "Needs Attention" ? "row-attention" : ""}">
                  <td>${i + 1}</td>
                  <td>
                    <a class="project-link" href="${p.url}" target="_blank">
                      Open project
                    </a>
                  </td>
                  <td>${p.team}</td>
                  <td>${p.categoria}</td>
                  <td style="color:red;">${p.diasLate} días late</td>
                  <td>${badgeHealth(p.health)}</td>
                  <td>${p.ultimaNota}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `).join("");
    }

    function badgeHealth(health) {
      if (health === "At Risk") {
        return `<span class="status-risk">At Risk</span>`;
      }

      if (health === "Needs Attention") {
        return `<span class="status-attention">Needs Attention</span>`;
      }

      return `<span class="status-good">Good</span>`;
    }

    function limpiarBusqueda() {
      document.getElementById("buscarFecha").value = "";
      renderizarHistorial();
    }

    function guardarPDF() {
      const historial = document.getElementById("historialAuditorias");

      if (!historial.innerHTML.trim() || historial.innerText.includes("No hay auditorías")) {
        alert("No hay auditorías para exportar.");
        return;
      }

      const opciones = {
        margin: 0.25,
        filename: "Auditoria_Guardada.pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true
        },
        jsPDF: {
          unit: "in",
          format: "letter",
          orientation: "landscape"
        }
      };

      html2pdf().set(opciones).from(historial).save();
    }

    function borrarTodo() {
      if (confirm("¿Seguro que deseas borrar todo el historial?")) {
        localStorage.removeItem("auditorias");
        renderizarHistorial();
      }
    }

    renderizarPreview();
    renderizarHistorial();
  </script>
</body>
</html>
