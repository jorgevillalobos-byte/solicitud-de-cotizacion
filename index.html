<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Project Health</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px;color:#1f2937}
.container{max-width:1400px;margin:auto;background:white;padding:25px;border-radius:14px}
h1,h2{color:#0f172a}
label{font-weight:bold;display:block;margin-top:12px}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border:1px solid #cbd5e1;border-radius:8px;box-sizing:border-box}
textarea{min-height:70px}
.grid,.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{background:#fff;padding:18px;border-radius:12px;border:1px solid #e5e7eb}
.card p{font-size:32px;font-weight:bold;margin:8px 0}
button{margin-top:15px;padding:12px 18px;border:0;border-radius:8px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}
.danger{background:#dc2626}
.admin-btn{background:#64748b}
.admin-area{text-align:right;margin-top:20px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #e5e7eb;padding:10px;text-align:left;font-size:14px;vertical-align:top}
th{background:#f8fafc}
.row-good{background:#f0fdfa}
.row-risk{background:#fffbeb}
.row-attention{background:#fef2f2}
.badge{padding:7px 12px;border-radius:8px;font-weight:bold;display:inline-block}
.badge-good{background:#ccfbf1;color:#0f766e}
.badge-risk{background:#fef3c7;color:#92400e}
.badge-attention{background:#fee2e2;color:#991b1b}
.good{color:#14b8a6;font-weight:bold}
.risk{color:#f59e0b;font-weight:bold}
.attention{color:#ef4444;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<h1>Project Health</h1>

<h2>Dashboard Ejecutivo</h2>

<div class="cards">
  <div class="card"><h3>Total Projects</h3><p id="cardProjects">0</p></div>
  <div class="card"><h3>Good</h3><p id="cardGood">0</p></div>
  <div class="card"><h3>At Risk</h3><p id="cardRisk">0</p></div>
  <div class="card"><h3>Needs Attention</h3><p id="cardAttention">0</p></div>
  <div class="card"><h3>Late Projects</h3><p id="cardLate">0</p></div>
</div>

<h2>Agregar Proyecto</h2>

<div class="grid">
  <div>
    <label>Project URL</label>
    <input type="url" id="projectUrl">
  </div>

  <div>
    <label>Team Responsable</label>
    <input type="text" id="teamResponsable">
  </div>

  <div>
    <label>Categoría de Proyecto</label>
    <input type="text" id="categoriaProyecto" placeholder="Escribe la categoría">
  </div>

  <div>
    <label>Días Late</label>
    <input type="number" id="diasLate" min="0" value="0">
  </div>

  <div>
    <label>Health</label>
    <select id="health">
      <option>Good</option>
      <option>At Risk</option>
      <option>Needs Attention</option>
    </select>
  </div>
</div>

<label>Última nota</label>
<textarea id="ultimaNota"></textarea>

<button onclick="agregarProyecto()">Agregar proyecto</button>

<h2>Filtros</h2>

<div class="grid">
  <div>
    <label>Filtrar por Team Responsable</label>
    <input type="text" id="filterTeamResponsable" oninput="actualizarTabla()">
  </div>

  <div>
    <label>Filtrar por Categoría</label>
    <input type="text" id="filterCategoriaProyecto" oninput="actualizarTabla()">
  </div>

  <div>
    <label>Filtrar por Health</label>
    <select id="filterHealth" onchange="actualizarTabla()">
      <option value="">Todos</option>
      <option>Good</option>
      <option>At Risk</option>
      <option>Needs Attention</option>
    </select>
  </div>

  <div>
    <label>Ordenar por</label>
    <select id="sortBy" onchange="actualizarTabla()">
      <option value="">Sin ordenar</option>
      <option value="health">Health</option>
      <option value="teamResponsable">Team Responsable</option>
      <option value="categoriaProyecto">Categoría</option>
      <option value="diasLate">Días Late</option>
    </select>
  </div>
</div>

<h2>Listado de Proyectos</h2>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Project URL</th>
  <th>Team Responsable</th>
  <th>Categoría</th>
  <th>Días Late</th>
  <th>Health</th>
  <th>Última nota</th>
  <th>Acción</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h2>Bloqueos Identificados</h2>
<textarea id="bloqueos"></textarea>

<h2>Acciones Requeridas</h2>
<textarea id="acciones"></textarea>

<div class="admin-area">
  <button class="admin-btn" onclick="mostrarBotonAdmin()">
    Acceso Administrador
  </button>

  <button
    id="btnReset"
    class="danger"
    onclick="reiniciarReporte()"
    style="display:none;">
    Reiniciar reporte
  </button>
</div>

</div>

<script>
let proyectos = [];

function agregarProyecto(){
  const projectUrl = document.getElementById("projectUrl").value;
  const teamResponsable = document.getElementById("teamResponsable").value;
  const categoriaProyecto = document.getElementById("categoriaProyecto").value;
  const diasLate = Number(document.getElementById("diasLate").value);
  const health = document.getElementById("health").value;
  const ultimaNota = document.getElementById("ultimaNota").value;

  if(!projectUrl || !teamResponsable || !categoriaProyecto){
    alert("Completa Project URL, Team Responsable y Categoría.");
    return;
  }

  proyectos.push({
    projectUrl,
    teamResponsable,
    categoriaProyecto,
    diasLate,
    health,
    ultimaNota
  });

  limpiarFormulario();
  actualizarTodo();
}

function limpiarFormulario(){
  document.getElementById("projectUrl").value = "";
  document.getElementById("teamResponsable").value = "";
  document.getElementById("categoriaProyecto").value = "";
  document.getElementById("diasLate").value = 0;
  document.getElementById("health").value = "Good";
  document.getElementById("ultimaNota").value = "";
}

function healthBadge(health){
  if(health === "Good"){
    return '<span class="badge badge-good">Good</span>';
  }

  if(health === "At Risk"){
    return '<span class="badge badge-risk">At Risk</span>';
  }

  return '<span class="badge badge-attention">Needs Attention</span>';
}

function rowClass(health){
  if(health === "Good") return "row-good";
  if(health === "At Risk") return "row-risk";
  return "row-attention";
}

function diasLateBadge(diasLate){
  if(diasLate > 5){
    return '<span class="attention">' + diasLate + ' días late</span>';
  }

  if(diasLate > 0){
    return '<span class="risk">' + diasLate + ' días late</span>';
  }

  return '<span class="good">0 días late</span>';
}

function obtenerProyectosFiltrados(){
  const team = document.getElementById("filterTeamResponsable").value.toLowerCase();
  const categoria = document.getElementById("filterCategoriaProyecto").value.toLowerCase();
  const health = document.getElementById("filterHealth").value;
  const sortBy = document.getElementById("sortBy").value;

  let data = [...proyectos];

  if(team){
    data = data.filter(p => p.teamResponsable.toLowerCase().includes(team));
  }

  if(categoria){
    data = data.filter(p => p.categoriaProyecto.toLowerCase().includes(categoria));
  }

  if(health){
    data = data.filter(p => p.health === health);
  }

  if(sortBy === "health"){
    const orden = {
      "Needs Attention": 1,
      "At Risk": 2,
      "Good": 3
    };
    data.sort((a,b) => orden[a.health] - orden[b.health]);
  }

  if(sortBy === "teamResponsable"){
    data.sort((a,b) => a.teamResponsable.localeCompare(b.teamResponsable));
  }

  if(sortBy === "categoriaProyecto"){
    data.sort((a,b) => a.categoriaProyecto.localeCompare(b.categoriaProyecto));
  }

  if(sortBy === "diasLate"){
    data.sort((a,b) => b.diasLate - a.diasLate);
  }

  return data;
}

function actualizarTabla(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const data = obtenerProyectosFiltrados();

  data.forEach((p,i) => {
    const originalIndex = proyectos.indexOf(p);

    tbody.innerHTML += `
      <tr class="${rowClass(p.health)}">
        <td>${i + 1}</td>
        <td><a href="${p.projectUrl}" target="_blank">Open project</a></td>
        <td>${p.teamResponsable}</td>
        <td>${p.categoriaProyecto}</td>
        <td>${diasLateBadge(p.diasLate)}</td>
        <td>${healthBadge(p.health)}</td>
        <td>${p.ultimaNota || "Sin nota registrada"}</td>
        <td><button class="danger" onclick="eliminarProyecto(${originalIndex})">Eliminar</button></td>
      </tr>
    `;
  });
}

function actualizarCards(){
  const total = proyectos.length;
  const good = proyectos.filter(p => p.health === "Good").length;
  const risk = proyectos.filter(p => p.health === "At Risk").length;
  const attention = proyectos.filter(p => p.health === "Needs Attention").length;
  const late = proyectos.filter(p => Number(p.diasLate) > 0).length;

  document.getElementById("cardProjects").innerText = total;
  document.getElementById("cardGood").innerText = good;
  document.getElementById("cardRisk").innerText = risk;
  document.getElementById("cardAttention").innerText = attention;
  document.getElementById("cardLate").innerText = late;
}

function eliminarProyecto(i){
  const password = prompt("Ingrese contraseña para eliminar este proyecto:");

  if(password !== "Elite2025"){
    alert("Contraseña incorrecta.");
    return;
  }

  proyectos.splice(i,1);
  actualizarTodo();
}

function actualizarTodo(){
  actualizarTabla();
  actualizarCards();
}

function mostrarBotonAdmin(){
  const password = prompt("Contraseña de administrador:");

  if(password === "Elite2025"){
    document.getElementById("btnReset").style.display = "inline-block";
    alert("Acceso concedido.");
  }else{
    alert("Contraseña incorrecta.");
  }
}

function reiniciarReporte(){
  const password = prompt("Confirme nuevamente la contraseña:");

  if(password !== "Elite2025"){
    alert("Contraseña incorrecta.");
    return;
  }

  const confirmar = confirm("¿Está seguro de reiniciar todo el reporte?");

  if(!confirmar){
    return;
  }

  proyectos = [];

  document.getElementById("bloqueos").value = "";
  document.getElementById("acciones").value = "";

  actualizarTodo();

  document.getElementById("btnReset").style.display = "none";

  alert("Reporte reiniciado correctamente.");
}
</script>

</body>
</html>
